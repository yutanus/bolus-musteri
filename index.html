<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bölüş - Hesabınız</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      max-width: 500px;
      margin: 20px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      color: #333;
    }
    #adisyon-bilgi {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    #adisyon-bilgi .baslik {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
    }
    #adisyon-bilgi .satir {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
      color: #555;
    }
    #adisyon-bilgi .kalan {
      color: #007aff;
      font-weight: bold;
      font-size: 16px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #eee;
    }
    .kalem {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .kalem.tamamen-odendi {
      opacity: 0.5;
    }
    .kalem-ust {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .kalem-ad {
      font-weight: 600;
    }
    .kalem-detay {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
    }
    .kalem-alt {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    button {
      background: #007aff;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    button.adet-btn {
      width: 32px;
      height: 32px;
      padding: 0;
      font-size: 18px;
      border-radius: 50%;
      background: #f0f0f0;
      color: #333;
    }
    button.adet-btn:disabled {
      background: #f8f8f8;
      color: #ccc;
    }
    .adet-sayi {
      min-width: 28px;
      text-align: center;
      font-weight: 600;
    }
    button.ode-btn {
      flex: 1;
      margin-left: 10px;
    }
    #tamamlandi {
      background: #34c759;
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
      display: none;
    }
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1000;
      max-width: 90%;
      text-align: center;
    }
    #toast.gozuk {
      opacity: 1;
    }
    #toast.hata {
      background: #ff3b30;
    }
    #toast.basari {
      background: #34c759;
    }
  </style>
</head>
<body>

  <h1>Hesabınız</h1>
  <div id="adisyon-bilgi">Yükleniyor...</div>
  <div id="kalemler"></div>
  <button id="hepsini-ode-btn" style="display: none; background: #34c759; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; cursor: pointer; width: 100%; margin-bottom: 15px;">Hepsini Öde</button>
  <div id="toast"></div>
  <div id="tamamlandi">Tüm hesap ödendi. Teşekkürler!</div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL = 'https://ybgzysyojshulpmdyrrm.supabase.co'
    const SUPABASE_KEY = 'sb_publishable__y__ogbkSM4Y0QwFrE-UUQ_Eamnac2R'

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    let islemDevamEdiyor = false

    function toastGoster(mesaj, tip) {
      const toast = document.getElementById('toast')
      toast.className = 'gozuk ' + (tip || 'basari')
      toast.innerHTML = mesaj
      setTimeout(() => {
        toast.className = ''
      }, 3000)
    }

    const urlParametreleri = new URLSearchParams(window.location.search)
    const qrKod = urlParametreleri.get('qr') || 'x7gh2km9pq'

    // Her kalem için seçilen ödenecek adet (kullanıcı butonlarla artırıyor)
    const secimler = {}

    async function adisyonGetir() {
      const adisyonBilgi = document.getElementById('adisyon-bilgi')
      const kalemlerDiv = document.getElementById('kalemler')
      const tamamlandiDiv = document.getElementById('tamamlandi')

      const { data: masa, error: masaHata } = await supabase
        .from('masalar').select('*').eq('qr_kod', qrKod).single()

      if (masaHata || !masa) {
        adisyonBilgi.innerHTML = 'Masa bulunamadı.'
        return
      }

      const { data: adisyon } = await supabase
        .from('adisyonlar').select('*')
        .eq('masa_id', masa.id).eq('durum', 'acik').maybeSingle()

      if (!adisyon) {
        adisyonBilgi.innerHTML = 'Bu masada açık adisyon yok.'
        kalemlerDiv.innerHTML = ''
        document.getElementById('hepsini-ode-btn').style.display = 'none'
        tamamlandiDiv.style.display = 'none'
        return
      }

      const { data: kalemler } = await supabase
        .from('adisyon_kalemleri').select('*')
        .eq('adisyon_id', adisyon.id).order('id', { ascending: true })

      // Hesaplamalar
      const toplam = kalemler.reduce((acc, k) => acc + Number(k.birim_fiyat) * k.adet, 0)
      const odenen = kalemler.reduce((acc, k) => acc + Number(k.birim_fiyat) * k.odenmis_adet, 0)
      const kalan = toplam - odenen

      adisyonBilgi.innerHTML = `
        <div class="baslik">${masa.numara}</div>
        <div class="satir"><span>Toplam:</span><span>${toplam.toFixed(2)}₺</span></div>
        <div class="satir"><span>Ödenen:</span><span>${odenen.toFixed(2)}₺</span></div>
        <div class="kalan satir"><span>Kalan:</span><span>${kalan.toFixed(2)}₺</span></div>
      `

      const hepsiniOdeBtn = document.getElementById('hepsini-ode-btn')

      if (kalan === 0 && kalemler.length > 0) {
        tamamlandiDiv.style.display = 'block'
        hepsiniOdeBtn.style.display = 'none'

        if (adisyon.durum === 'acik') {
          await supabase.from('adisyonlar')
            .update({ durum: 'odendi', kapanis_zamani: new Date().toISOString() })
            .eq('id', adisyon.id)
        }
      } else {
        tamamlandiDiv.style.display = 'none'
        if (kalan > 0) {
          hepsiniOdeBtn.style.display = 'block'
          hepsiniOdeBtn.innerHTML = 'Hepsini Öde (' + kalan.toFixed(2) + '₺)'
          hepsiniOdeBtn.onclick = () => hepsiniOde(adisyon.id, kalan)
        } else {
          hepsiniOdeBtn.style.display = 'none'
        }
      }

      // Kalemleri çiz
      kalemlerDiv.innerHTML = ''
      kalemler.forEach(kalem => {
        const kalanAdet = kalem.adet - kalem.odenmis_adet
        const tamamenOdendi = kalanAdet === 0
        const birimFiyat = Number(kalem.birim_fiyat)

        // Bu kalem için seçili adet (başlangıç: kalanAdet ise 1, değilse 0)
        if (secimler[kalem.id] === undefined || secimler[kalem.id] > kalanAdet) {
          secimler[kalem.id] = kalanAdet > 0 ? 1 : 0
        }

        const satir = document.createElement('div')
        satir.className = tamamenOdendi ? 'kalem tamamen-odendi' : 'kalem'

        const odenmisYazi = kalem.odenmis_adet > 0 
          ? ` (${kalem.odenmis_adet}/${kalem.adet} ödendi)` 
          : ''

        if (tamamenOdendi) {
          satir.innerHTML = `
            <div class="kalem-ust">
              <div>
                <div class="kalem-ad">${kalem.urun_adi} × ${kalem.adet}</div>
                <div class="kalem-detay">Tamamen ödendi ✓</div>
              </div>
              <div>${(birimFiyat * kalem.adet).toFixed(2)}₺</div>
            </div>
          `
        } else {
          const secili = secimler[kalem.id]
          const odenecekTutar = (birimFiyat * secili).toFixed(2)
          
          satir.innerHTML = `
            <div class="kalem-ust">
              <div>
                <div class="kalem-ad">${kalem.urun_adi} × ${kalem.adet}</div>
                <div class="kalem-detay">${birimFiyat.toFixed(2)}₺/adet${odenmisYazi}</div>
              </div>
              <div>${(birimFiyat * kalem.adet).toFixed(2)}₺</div>
            </div>
            <div class="kalem-alt">
              <button class="adet-btn" data-aksiyon="azalt" data-kalem-id="${kalem.id}" ${secili <= 1 ? 'disabled' : ''}>−</button>
              <span class="adet-sayi">${secili}</span>
              <button class="adet-btn" data-aksiyon="arttir" data-kalem-id="${kalem.id}" ${secili >= kalanAdet ? 'disabled' : ''}>+</button>
              <button class="ode-btn" data-aksiyon="ode" data-kalem-id="${kalem.id}">${secili} adet öde (${odenecekTutar}₺)</button>
            </div>
          `
        }

        kalemlerDiv.appendChild(satir)
      })

      // Butonlara olay bağla
      document.querySelectorAll('[data-aksiyon]').forEach(btn => {
        btn.onclick = () => butonAksiyon(btn, adisyon.id, kalemler)
      })
    }

    function butonAksiyon(btn, adisyonId, kalemler) {
      const aksiyon = btn.getAttribute('data-aksiyon')
      const kalemId = Number(btn.getAttribute('data-kalem-id'))
      const kalem = kalemler.find(k => k.id === kalemId)
      const kalanAdet = kalem.adet - kalem.odenmis_adet

      if (aksiyon === 'arttir') {
        if (secimler[kalemId] < kalanAdet) secimler[kalemId]++
        adisyonGetir()
      } else if (aksiyon === 'azalt') {
        if (secimler[kalemId] > 1) secimler[kalemId]--
        adisyonGetir()
      } else if (aksiyon === 'ode') {
        kismiOde(adisyonId, kalem, secimler[kalemId])
      }
    }

    // Tek kalemin secili adedini iyzico ile ode
    async function kismiOde(adisyonId, kalem, adet) {
      if (islemDevamEdiyor) return
      islemDevamEdiyor = true

      const birimFiyat = Number(kalem.birim_fiyat)
      const tutar = birimFiyat * adet

      // Fis: "ITEM-<adisyon>-<kalem>-<adet>"
      const fis = 'ITEM-' + adisyonId + '-' + kalem.id + '-' + adet

      await odemeyeYonlen(fis, tutar)
    }

    // Tum adisyoni iyzico ile ode
    async function hepsiniOde(adisyonId, kalan) {
      if (islemDevamEdiyor) return
      islemDevamEdiyor = true

      if (!confirm('Tüm ödenmemiş kalemleri ödemek istiyor musun? Toplam: ' + kalan.toFixed(2) + '₺')) {
        islemDevamEdiyor = false
        return
      }

      // Fis: "FULL-<adisyon>"
      const fis = 'FULL-' + adisyonId

      await odemeyeYonlen(fis, kalan)
    }

    // Ortak: odeme-baslat'a istek at, iyzico sayfasina yonlendir
    async function odemeyeYonlen(fis, tutar) {
      try {
        const cevap = await fetch('/api/odeme-baslat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fis: fis, tutar: tutar })
        })

        const veri = await cevap.json()

        if (!veri.basarili || !veri.sonuc || !veri.sonuc.paymentPageUrl) {
          toastGoster('Ödeme başlatılamadı, tekrar deneyin', 'hata')
          islemDevamEdiyor = false
          return
        }

        // iyzico'nun guvenli odeme sayfasina yonlendir
        window.location.href = veri.sonuc.paymentPageUrl
      } catch (e) {
        toastGoster('Baglanti hatasi: ' + e.message, 'hata')
        islemDevamEdiyor = false
      }
    }

    adisyonGetir()
  </script>

</body>
</html>
