<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bölüş - Garson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --turkuaz: #0EA5B5;
      --turkuaz-koyu: #0B8694;
      --lacivert: #13294B;
      --lacivert-koyu: #0d1c33;
      --ink: #13294B;
      --soft: #5a7178;
      --bg: #dbe6e7;
      --surface: #ffffff;
      --line: #eef2f2;
      --kirmizi: #c0392b;
      --font: 'Plus Jakarta Sans', -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      max-width: 500px;
      margin: 0 auto;
      padding: 16px 14px 50px;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    .ust-bant {
      background: linear-gradient(135deg, var(--turkuaz), var(--lacivert));
      border-radius: 18px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 16px;
    }
    .ust-bant svg { width: 30px; height: 30px; flex-shrink: 0; }
    .ust-bant .ad { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .ust-bant .rol { margin-left: auto; font-size: 12px; font-weight: 600; color: #cfeef2; background: rgba(255,255,255,0.15); padding: 5px 11px; border-radius: 8px; }

    .ekran { display: none; }
    .ekran.aktif { display: block; }

    .kart { background: var(--surface); padding: 22px; border-radius: 16px; margin-bottom: 14px; box-shadow: 0 4px 16px rgba(19,41,75,0.06); }

    h2.bolum { font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 12px; }
    h3 { font-size: 15px; font-weight: 700; color: var(--ink); }

    label { display: block; margin-bottom: 6px; color: var(--soft); font-size: 13px; font-weight: 600; }
    input {
      width: 100%; padding: 12px; margin-bottom: 14px;
      border: 1px solid #dde7e7; border-radius: 10px; font-size: 16px;
      font-family: var(--font); background: #fafcfc; color: var(--ink);
    }
    input:focus { outline: none; border-color: var(--turkuaz); background: #fff; }

    button {
      width: 100%; background: var(--turkuaz); color: #fff; border: none;
      padding: 13px; border-radius: 11px; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-bottom: 10px; font-family: var(--font);
    }
    button:active { background: var(--turkuaz-koyu); }
    button:disabled { background: #b8c5c5; cursor: not-allowed; }
    button.cikis { background: var(--kirmizi); }
    button.geri { background: #8895a0; }
    button.kucuk { width: auto; padding: 8px 15px; margin: 0; font-size: 13px; }

    .baslik { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .karsilama { color: var(--ink); font-size: 14px; font-weight: 600; }

    .masa-karti {
      background: var(--surface); padding: 18px; border-radius: 14px; margin-bottom: 10px;
      cursor: pointer; display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 3px 12px rgba(19,41,75,0.05);
    }
    .masa-karti:active { background: #f3f9f9; }
    .masa-karti strong { color: var(--ink); font-size: 16px; font-weight: 700; }
    .durum-acik { background: var(--turkuaz); color: #fff; padding: 5px 11px; border-radius: 8px; font-size: 12px; font-weight: 700; white-space: nowrap; }
    .durum-bos { background: #e6edee; color: var(--soft); padding: 5px 11px; border-radius: 8px; font-size: 12px; font-weight: 700; white-space: nowrap; }

    .kalem-satir {
      background: var(--surface); padding: 15px 16px; border-radius: 12px; margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 8px rgba(19,41,75,0.04);
    }
    .kalem-satir.odendi { opacity: 0.5; }
    .kalem-satir > div:first-child { color: var(--ink); font-weight: 600; font-size: 14.5px; }
    .sil-btn {
      background: var(--kirmizi); color: #fff; border: none;
      width: 28px; height: 28px; border-radius: 50%; font-size: 16px;
      cursor: pointer; padding: 0; margin: 0; line-height: 1; flex-shrink: 0;
    }
    .sil-btn:disabled { background: #ccc; }

    .form-satir { display: flex; gap: 8px; margin-bottom: 14px; }
    .form-satir input { margin-bottom: 0; }

    #mesaj, #adisyon-mesaj { margin-top: 14px; padding: 11px; border-radius: 10px; text-align: center; display: none; font-size: 14px; font-weight: 600; }
    .hata { background: #fdecea; color: var(--kirmizi); display: block !important; }

    .toplam-kutu {
      background: linear-gradient(135deg, var(--turkuaz), var(--lacivert));
      color: #fff; padding: 18px; border-radius: 14px; margin-bottom: 14px;
      text-align: center; font-size: 19px; font-weight: 800;
    }
    .toplam-kutu small { font-weight: 500; font-size: 13px; opacity: 0.9; }
    .zaman-bilgi { text-align: center; color: var(--soft); font-size: 13px; margin-bottom: 14px; font-weight: 500; }
  </style>
</head>
<body>

  <div class="ust-bant">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <line x1="42" y1="14" x2="42" y2="80" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
      <line x1="42" y1="74" x2="62" y2="74" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
      <line x1="26" y1="40" x2="58" y2="30" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
      <line x1="26" y1="54" x2="58" y2="44" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
      <circle cx="42" cy="50" r="7" fill="#7fe0e8"/>
      <circle cx="42" cy="92" r="7" fill="#7fe0e8"/>
    </svg>
    <span class="ad">Bölüş</span>
    <span class="rol">Garson</span>
  </div>

  <div id="ekran-giris" class="ekran aktif">
    <div class="kart">
      <h2 class="bolum">Giriş yap</h2>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="garson1@bolus.local">
      <label for="sifre">Şifre</label>
      <input type="password" id="sifre" placeholder="••••••••">
      <button id="giris-btn">Giriş</button>
      <div id="mesaj"></div>
    </div>
  </div>

  <div id="ekran-masalar" class="ekran">
    <div class="baslik">
      <span class="karsilama" id="karsilama">Hoş geldin</span>
      <button class="cikis kucuk" id="cikis-btn">Çıkış</button>
    </div>
    <h2 class="bolum">Masalar</h2>
    <div id="masa-listesi"></div>
  </div>

  <div id="ekran-adisyon" class="ekran">
    <div class="baslik">
      <button class="geri kucuk" id="geri-btn">← Masalar</button>
      <span class="karsilama" id="masa-basligi"></span>
    </div>
    <div id="adisyon-icerik"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL = 'https://ybgzysyojshulpmdyrrm.supabase.co'
    const SUPABASE_KEY = 'sb_publishable__y__ogbkSM4Y0QwFrE-UUQ_Eamnac2R'

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    let garsonBilgi = null
    let secilenMasa = null

    function ekranGoster(ekranId) {
      document.querySelectorAll('.ekran').forEach(e => e.classList.remove('aktif'))
      document.getElementById(ekranId).classList.add('aktif')
    }

    function zamanFarki(tarihStr) {
      const tarih = new Date(tarihStr)
      const simdi = new Date()
      const farkSn = Math.floor((simdi - tarih) / 1000)
      const farkDk = Math.floor(farkSn / 60)
      const farkSt = Math.floor(farkDk / 60)
      if (farkSn < 60) return 'az önce'
      if (farkDk < 60) return farkDk + ' dakika önce'
      if (farkSt < 24) return farkSt + ' saat önce'
      const farkGn = Math.floor(farkSt / 24)
      return farkGn + ' gün önce'
    }

    const girisBtn = document.getElementById('giris-btn')
    const mesaj = document.getElementById('mesaj')

    girisBtn.onclick = async () => {
      const email = document.getElementById('email').value
      const sifre = document.getElementById('sifre').value

      if (!email || !sifre) {
        mesaj.className = 'hata'
        mesaj.innerHTML = 'Email ve şifre boş bırakılamaz.'
        return
      }

      girisBtn.disabled = true
      girisBtn.innerHTML = 'Giriş yapılıyor...'

      const { data, error } = await supabase.auth.signInWithPassword({ email, password: sifre })

      if (error) {
        mesaj.className = 'hata'
        mesaj.innerHTML = 'Hata: ' + error.message
        girisBtn.disabled = false
        girisBtn.innerHTML = 'Giriş'
        return
      }

      const { data: garson, error: garsonHata } = await supabase
        .from('garsonlar').select('*').eq('id', data.user.id).single()

      if (garsonHata || !garson) {
        mesaj.className = 'hata'
        mesaj.innerHTML = 'Bu kullanıcı garson kaydı bulunamadı.'
        await supabase.auth.signOut()
        girisBtn.disabled = false
        girisBtn.innerHTML = 'Giriş'
        return
      }

      garsonBilgi = garson
      girisBtn.disabled = false
      girisBtn.innerHTML = 'Giriş'
      mesaj.className = ''
      mesaj.innerHTML = ''

      document.getElementById('karsilama').innerHTML = 'Hoş geldin, ' + garson.ad
      ekranGoster('ekran-masalar')
      masalariYukle()
    }

    document.getElementById('cikis-btn').onclick = async () => {
      if (!confirm('Çıkış yapmak istediğine emin misin?')) return
      await supabase.auth.signOut()
      garsonBilgi = null
      secilenMasa = null
      ekranGoster('ekran-giris')
    }

    document.getElementById('geri-btn').onclick = () => {
      secilenMasa = null
      ekranGoster('ekran-masalar')
      masalariYukle()
    }

    async function masalariYukle() {
      const liste = document.getElementById('masa-listesi')
      liste.innerHTML = 'Yükleniyor...'

      const { data: masalar, error } = await supabase
        .from('masalar').select('*')
        .eq('restoran_id', garsonBilgi.restoran_id)
        .order('id', { ascending: true })

      if (error) {
        liste.innerHTML = 'Hata: ' + error.message
        return
      }

      const { data: adisyonlar } = await supabase
        .from('adisyonlar')
        .select('id, masa_id, toplam_tutar, adisyon_kalemleri(birim_fiyat, odenmis_adet)')
        .eq('durum', 'acik')

      const adisyonBilgileri = {}
      ;(adisyonlar || []).forEach(a => {
        const odenen = (a.adisyon_kalemleri || []).reduce(
          (acc, k) => acc + Number(k.birim_fiyat) * k.odenmis_adet, 0
        )
        adisyonBilgileri[a.masa_id] = {
          toplam: Number(a.toplam_tutar),
          odenen: odenen,
          kalan: Number(a.toplam_tutar) - odenen
        }
      })

      liste.innerHTML = ''
      masalar.forEach(masa => {
        const kart = document.createElement('div')
        kart.className = 'masa-karti'
        const bilgi = adisyonBilgileri[masa.id]

        if (bilgi) {
          kart.innerHTML = `
            <div>
              <div><strong>${masa.numara}</strong></div>
              <div style="font-size: 12px; color: #7a8893; margin-top: 4px; font-weight: 500;">
                Toplam: ${bilgi.toplam.toFixed(2)}₺ · Kalan: ${bilgi.kalan.toFixed(2)}₺
              </div>
            </div>
            <span class="durum-acik">Adisyon Açık</span>
          `
        } else {
          kart.innerHTML = `
            <span><strong>${masa.numara}</strong></span>
            <span class="durum-bos">Boş</span>
          `
        }

        kart.onclick = () => masaSec(masa)
        liste.appendChild(kart)
      })
    }

    async function masaSec(masa) {
      secilenMasa = masa
      document.getElementById('masa-basligi').innerHTML = masa.numara
      ekranGoster('ekran-adisyon')
      adisyonuYukle()
    }

    async function adisyonuYukle() {
      const icerik = document.getElementById('adisyon-icerik')
      icerik.innerHTML = 'Yükleniyor...'

      const { data: adisyon, error: adisyonHata } = await supabase
        .from('adisyonlar').select('*')
        .eq('masa_id', secilenMasa.id).eq('durum', 'acik').maybeSingle()

      if (adisyonHata) {
        icerik.innerHTML = 'Hata: ' + adisyonHata.message
        return
      }

      if (!adisyon) {
        icerik.innerHTML = `
          <div class="kart">
            <p style="margin-bottom: 14px; color: var(--soft); font-weight: 500;">Bu masada açık adisyon yok.</p>
            <button id="yeni-adisyon-btn">Yeni Adisyon Aç</button>
          </div>
        `
        document.getElementById('yeni-adisyon-btn').onclick = yeniAdisyonAc
        return
      }

      const { data: kalemler } = await supabase
        .from('adisyon_kalemleri').select('*')
        .eq('adisyon_id', adisyon.id).order('id', { ascending: true })

      const toplam = (kalemler || []).reduce((acc, k) => acc + Number(k.birim_fiyat) * k.adet, 0)
      const odenen = (kalemler || []).reduce((acc, k) => acc + Number(k.birim_fiyat) * k.odenmis_adet, 0)
      const kalan = toplam - odenen

      let kalemlerHtml = ''
      if (kalemler && kalemler.length > 0) {
        kalemler.forEach(k => {
          const silButonu = k.odenmis_adet > 0
            ? ''
            : `<button class="sil-btn" data-kalem-id="${k.id}">×</button>`

          let durumYazi = ''
          if (k.odendi_mi) {
            durumYazi = '✓ Tamamen ödendi'
          } else if (k.odenmis_adet > 0) {
            durumYazi = `${k.odenmis_adet}/${k.adet} ödendi`
          }

          kalemlerHtml += `
            <div class="kalem-satir ${k.odendi_mi ? 'odendi' : ''}">
              <div>
                <div>${k.urun_adi} × ${k.adet}</div>
                ${durumYazi ? `<div style="font-size: 12px; color: #7a8893; margin-top: 4px; font-weight: 500;">${durumYazi}</div>` : ''}
              </div>
              <span style="display: flex; align-items: center; gap: 10px;">
                <span style="font-weight: 700;">${(Number(k.birim_fiyat) * k.adet).toFixed(2)}₺</span>
                ${silButonu}
              </span>
            </div>
          `
        })
      } else {
        kalemlerHtml = '<p style="color: var(--soft); font-weight: 500;">Henüz ürün eklenmedi.</p>'
      }

      icerik.innerHTML = `
        <div class="toplam-kutu">
          Toplam: ${toplam.toFixed(2)}₺<br>
          <small>Ödenen: ${odenen.toFixed(2)}₺ · Kalan: ${kalan.toFixed(2)}₺</small>
        </div>

        <div class="zaman-bilgi">Adisyon ${zamanFarki(adisyon.acilis_zamani)} açıldı</div>

        <button id="adisyon-kapat-btn" style="background: var(--lacivert); margin-bottom: 16px;">Adisyonu Kapat</button>

        <div>${kalemlerHtml}</div>

        <div class="kart" style="margin-top: 16px;">
          <h3 style="margin-bottom: 14px;">Ürün Ekle</h3>
          <label>Ürün adı</label>
          <input type="text" id="urun-adi" placeholder="Örn: Margarita Pizza">

          <div class="form-satir">
            <div style="flex: 1;">
              <label>Fiyat (₺)</label>
              <input type="number" id="birim-fiyat" placeholder="0">
            </div>
            <div style="flex: 0 0 100px;">
              <label>Adet</label>
              <input type="number" id="adet" value="1" min="1">
            </div>
          </div>

          <button id="urun-ekle-btn">Ekle</button>
          <div id="adisyon-mesaj"></div>
        </div>
      `

      document.querySelectorAll('.sil-btn').forEach(btn => {
        btn.onclick = async () => {
          const kalemId = btn.getAttribute('data-kalem-id')
          if (!confirm('Bu kalemi silmek istediğine emin misin?')) return
          btn.disabled = true
          const { error } = await supabase.from('adisyon_kalemleri').delete().eq('id', kalemId)
          if (error) {
            alert('Silinemedi: ' + error.message)
            btn.disabled = false
            return
          }
          adisyonuYukle()
        }
      })

      document.getElementById('urun-ekle-btn').onclick = () => urunEkle(adisyon.id)

      document.getElementById('adisyon-kapat-btn').onclick = async () => {
        const onayMesaj = kalan > 0
          ? `Hala ${kalan.toFixed(2)}₺ ödenmemiş. Yine de adisyonu kapatmak istiyor musun?`
          : 'Adisyonu kapatmak istediğine emin misin?'

        if (!confirm(onayMesaj)) return

        const { error } = await supabase
          .from('adisyonlar')
          .update({ durum: 'odendi', kapanis_zamani: new Date().toISOString() })
          .eq('id', adisyon.id)

        if (error) {
          alert('Adisyon kapatılamadı: ' + error.message)
          return
        }

        secilenMasa = null
        ekranGoster('ekran-masalar')
        masalariYukle()
      }
    }

    async function yeniAdisyonAc() {
      const { error } = await supabase.from('adisyonlar').insert({ masa_id: secilenMasa.id })
      if (error) {
        alert('Adisyon açılamadı: ' + error.message)
        return
      }
      adisyonuYukle()
    }

    async function urunEkle(adisyonId) {
      const urunAdi = document.getElementById('urun-adi').value.trim()
      const birimFiyat = Number(document.getElementById('birim-fiyat').value)
      const adet = Number(document.getElementById('adet').value)
      const adisyonMesaj = document.getElementById('adisyon-mesaj')

      if (!urunAdi || !birimFiyat || !adet || birimFiyat <= 0 || adet <= 0) {
        adisyonMesaj.className = 'hata'
        adisyonMesaj.innerHTML = 'Tüm alanları doğru doldur.'
        return
      }

      const toplam = birimFiyat * adet
      const ekleBtn = document.getElementById('urun-ekle-btn')
      ekleBtn.disabled = true
      ekleBtn.innerHTML = 'Ekleniyor...'

      const { error } = await supabase.from('adisyon_kalemleri').insert({
        adisyon_id: adisyonId,
        urun_adi: urunAdi,
        birim_fiyat: birimFiyat,
        adet: adet,
        toplam: toplam
      })

      if (error) {
        adisyonMesaj.className = 'hata'
        adisyonMesaj.innerHTML = 'Hata: ' + error.message
        ekleBtn.disabled = false
        ekleBtn.innerHTML = 'Ekle'
        return
      }

      adisyonuYukle()
    }
  </script>

</body>
</html>
