<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bölüş - Hesabınız</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      max-width: 500px;
      margin: 20px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      color: #333;
    }
    #adisyon-bilgi {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    #adisyon-bilgi .baslik {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
    }
    #adisyon-bilgi .satir {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
      color: #555;
    }
    #adisyon-bilgi .kalan {
      color: #007aff;
      font-weight: bold;
      font-size: 16px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #eee;
    }
    .kalem {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .kalem.odendi {
      opacity: 0.5;
    }
    button {
      background: #007aff;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #tamamlandi {
      background: #34c759;
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Hesabınız</h1>
  <div id="adisyon-bilgi">Yükleniyor...</div>
  <div id="kalemler"></div>
  <div id="tamamlandi">Tüm hesap ödendi. Teşekkürler!</div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL = 'https://ybgzysyojshulpmdyrrm.supabase.co'
    const SUPABASE_KEY = 'sb_publishable__y__ogbkSM4Y0QwFrE-UUQ_Eamnac2R'

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    const urlParametreleri = new URLSearchParams(window.location.search)
    const qrKod = urlParametreleri.get('qr') || 'x7gh2km9pq'

    async function adisyonGetir() {
      const adisyonBilgi = document.getElementById('adisyon-bilgi')
      const kalemlerDiv = document.getElementById('kalemler')
      const tamamlandiDiv = document.getElementById('tamamlandi')

      // 1. Masayı bul
      const { data: masa, error: masaHata } = await supabase
        .from('masalar')
        .select('*')
        .eq('qr_kod', qrKod)
        .single()

      if (masaHata || !masa) {
        adisyonBilgi.innerHTML = 'Masa bulunamadı.'
        return
      }

      // 2. Açık adisyonu bul
      const { data: adisyon, error: adisyonHata } = await supabase
        .from('adisyonlar')
        .select('*')
        .eq('masa_id', masa.id)
        .eq('durum', 'acik')
        .single()

      if (adisyonHata || !adisyon) {
        adisyonBilgi.innerHTML = 'Bu masada açık adisyon yok.'
        return
      }

      // 3. Kalemleri çek
      const { data: kalemler, error: kalemlerHata } = await supabase
        .from('adisyon_kalemleri')
        .select('*')
        .eq('adisyon_id', adisyon.id)
        .order('id', { ascending: true })

      if (kalemlerHata) {
        adisyonBilgi.innerHTML = 'Kalemler yüklenemedi: ' + kalemlerHata.message
        return
      }

      // 4. Toplam ve ödenen hesapla
      const toplam = kalemler.reduce((acc, k) => acc + Number(k.toplam), 0)
      const odenen = kalemler.filter(k => k.odendi_mi).reduce((acc, k) => acc + Number(k.toplam), 0)
      const kalan = toplam - odenen

      // 5. Adisyonda toplam_tutar yanlışsa düzelt
      if (Number(adisyon.toplam_tutar) !== toplam) {
        await supabase
          .from('adisyonlar')
          .update({ toplam_tutar: toplam })
          .eq('id', adisyon.id)
      }

      // 6. Bilgi kutusunu doldur
      adisyonBilgi.innerHTML = `
        <div class="baslik">${masa.numara}</div>
        <div class="satir"><span>Toplam:</span><span>${toplam.toFixed(2)}₺</span></div>
        <div class="satir"><span>Ödenen:</span><span>${odenen.toFixed(2)}₺</span></div>
        <div class="kalan satir"><span>Kalan:</span><span>${kalan.toFixed(2)}₺</span></div>
      `

      // 7. Tüm kalemler ödendiyse "Tamamlandı" göster
      if (kalan === 0 && kalemler.length > 0) {
        tamamlandiDiv.style.display = 'block'
      } else {
        tamamlandiDiv.style.display = 'none'
      }

      // 8. Kalemleri ekrana yaz
      kalemlerDiv.innerHTML = ''
      kalemler.forEach(kalem => {
        const satir = document.createElement('div')
        satir.className = kalem.odendi_mi ? 'kalem odendi' : 'kalem'

        const yazi = document.createElement('span')
        yazi.innerHTML = kalem.urun_adi + ' - ' + Number(kalem.toplam).toFixed(2) + '₺'
        satir.appendChild(yazi)

        const buton = document.createElement('button')
        buton.innerHTML = kalem.odendi_mi ? 'Ödendi' : 'Bu kalemi öde'
        buton.disabled = kalem.odendi_mi

        buton.onclick = async () => {
          buton.disabled = true
          buton.innerHTML = 'Ödeniyor...'

          // A. Önce ödeme kaydı oluştur
          const { error: odemeHata } = await supabase
            .from('odemeler')
            .insert({
              adisyon_id: adisyon.id,
              tutar: kalem.toplam,
              durum: 'basarili'
            })

          if (odemeHata) {
            alert('Ödeme kaydı oluşturulamadı: ' + odemeHata.message)
            buton.disabled = false
            buton.innerHTML = 'Bu kalemi öde'
            return
          }

          // B. Sonra kalemi ödendi yap
          const { error: kalemHata } = await supabase
            .from('adisyon_kalemleri')
            .update({ odendi_mi: true })
            .eq('id', kalem.id)

          if (kalemHata) {
            alert('Kalem güncellenemedi: ' + kalemHata.message)
            return
          }

          // C. Sayfayı yenile
          adisyonGetir()
        }

        satir.appendChild(buton)
        kalemlerDiv.appendChild(satir)
      })
    }

    adisyonGetir()
  </script>

</body>
</html>
