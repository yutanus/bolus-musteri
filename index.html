<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bölüş - Hesabınız</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --turkuaz: #0EA5B5;
      --turkuaz-koyu: #0B8694;
      --acik-turkuaz: #7fe0e8;
      --lacivert: #13294B;
      --lacivert-koyu: #0d1c33;
      --ink: #13294B;
      --soft: #5a7178;
      --bg: #dbe6e7;
      --surface: #ffffff;
      --line: #eef2f2;
      --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      max-width: 480px;
      margin: 0 auto;
      padding: 18px 14px 50px;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .kart {
      background: var(--surface);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 12px 34px rgba(19, 41, 75, 0.14);
    }

    /* ---- Renkli üst bant ---- */
    .bant {
      background: linear-gradient(135deg, var(--turkuaz), var(--lacivert));
      padding: 22px 22px 24px;
      color: #fff;
    }
    .marka { display: flex; align-items: center; gap: 11px; }
    .marka svg { width: 34px; height: 34px; flex-shrink: 0; }
    .marka-ad { font-size: 23px; font-weight: 800; letter-spacing: -0.6px; color: #fff; }
    .tag { font-size: 12px; font-weight: 500; color: #cfeef2; margin-top: 4px; }

    .ozet-masa { font-size: 12px; font-weight: 600; color: #cfeef2; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 22px; }
    .ozet-etiket { font-size: 13px; font-weight: 500; color: #cfeef2; margin-top: 2px; }
    .ozet-tutar { font-size: 40px; font-weight: 800; letter-spacing: -1.5px; color: #fff; margin: 2px 0 14px; }
    .ilerleme-ray { height: 8px; background: rgba(255,255,255,0.25); border-radius: 99px; overflow: hidden; margin-bottom: 12px; }
    .ilerleme-dolu { height: 100%; background: #fff; border-radius: 99px; transition: width 0.3s; }
    .ozet-satirlar { display: flex; justify-content: space-between; font-size: 13px; color: #cfeef2; font-weight: 500; }
    .ozet-satirlar b { color: #fff; font-weight: 600; }

    /* ---- Gövde ---- */
    .govde { padding: 20px 20px 22px; }
    .bolum-baslik { font-size: 12px; font-weight: 600; color: var(--soft); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }

    .kalem {
      padding: 15px 0;
      border-bottom: 1px solid var(--line);
    }
    .kalem:last-of-type { border-bottom: none; }
    .kalem.tamamen-odendi { opacity: 0.55; }
    .kalem.secili {
      background: #f4fbfc;
      border-radius: 12px;
      padding: 13px 12px;
      border-bottom: 1px solid transparent;
      box-shadow: inset 0 0 0 1.5px var(--acik-turkuaz);
    }
    .kalem-ust { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .kalem-ad { font-weight: 600; font-size: 15.5px; color: var(--ink); }
    .kalem-detay { font-size: 12.5px; color: var(--soft); margin-top: 3px; font-weight: 500; }
    .kalem-fiyat { font-weight: 700; font-size: 15.5px; color: var(--ink); white-space: nowrap; }
    .kalem-rozet { display: inline-flex; align-items: center; gap: 4px; font-size: 12.5px; font-weight: 600; color: var(--turkuaz-koyu); margin-top: 3px; }
    .kalem-alt { display: flex; gap: 9px; align-items: center; margin-top: 13px; }

    button { font-family: var(--font); cursor: pointer; }

    .adet-btn {
      width: 38px; height: 38px; flex-shrink: 0; padding: 0;
      font-size: 20px; font-weight: 600; border-radius: 50%;
      background: #eef4f4; color: var(--lacivert); border: none;
    }
    .adet-btn:active:not(:disabled) { background: #e2ecec; }
    .adet-btn:disabled { color: #c2cccc; background: #f4f7f7; cursor: not-allowed; }
    .adet-sayi { min-width: 26px; text-align: center; font-weight: 700; font-size: 16px; color: var(--ink); }

    .sepet-etiket { flex: 1; text-align: right; font-size: 13.5px; font-weight: 700; color: var(--turkuaz-koyu); }
    .sepet-etiket.bos { color: var(--soft); font-weight: 500; }

    .sepet-ozet { display: none; text-align: center; font-size: 14px; color: var(--soft); font-weight: 600; margin-top: 18px; }
    .sepet-ozet b { color: var(--ink); font-weight: 800; }

    #sectiklerimi-ode-btn {
      display: none; width: 100%;
      background: var(--turkuaz); color: #fff; border: none;
      padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 700;
      margin-top: 10px;
      box-shadow: 0 8px 20px rgba(14, 165, 181, 0.3);
    }
    #sectiklerimi-ode-btn:active { background: var(--turkuaz-koyu); }

    #hepsini-ode-btn {
      display: none; width: 100%;
      background: var(--lacivert); color: #fff; border: none;
      padding: 14px; border-radius: 14px; font-size: 15px; font-weight: 700;
      margin-top: 10px;
    }
    #hepsini-ode-btn:active { background: var(--lacivert-koyu); }

    .guven-notu { display: flex; align-items: center; justify-content: center; gap: 7px; margin-top: 18px; font-size: 12px; color: var(--soft); font-weight: 500; }

    #tamamlandi {
      display: none; text-align: center; padding: 30px 22px;
      background: linear-gradient(135deg, var(--turkuaz), var(--turkuaz-koyu));
      color: #fff;
    }
    #tamamlandi .tik { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 800; margin: 0 auto 12px; }
    #tamamlandi .baslik { font-weight: 700; font-size: 20px; margin-bottom: 4px; }
    #tamamlandi .alt { font-size: 13.5px; opacity: 0.92; font-weight: 500; }

    .durum-mesaj { padding: 34px 22px; text-align: center; color: var(--soft); font-weight: 500; }

    #toast {
      position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
      background: var(--lacivert); color: #fff;
      padding: 13px 22px; border-radius: 12px; font-size: 14px; font-weight: 600;
      opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 1000;
      max-width: 90%; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    #toast.gozuk { opacity: 1; }
    #toast.hata { background: #c0392b; }
    #toast.basari { background: var(--turkuaz-koyu); }
  </style>
</head>
<body>

  <div class="kart">
    <div class="bant">
      <div class="marka">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <line x1="42" y1="14" x2="42" y2="80" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
          <line x1="42" y1="74" x2="62" y2="74" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
          <line x1="26" y1="40" x2="58" y2="30" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
          <line x1="26" y1="54" x2="58" y2="44" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
          <circle cx="42" cy="50" r="7" fill="#7fe0e8"/>
          <circle cx="42" cy="92" r="7" fill="#7fe0e8"/>
        </svg>
        <span class="marka-ad">Bölüş</span>
      </div>
      <div class="tag">Hesabını paylaş, payını öde</div>
      <div id="adisyon-bilgi"><div class="ozet-etiket">Yükleniyor...</div></div>
    </div>

    <div class="govde">
      <div id="kalemler"></div>
      <div id="sepet-ozet" class="sepet-ozet"></div>
      <button id="sectiklerimi-ode-btn">Seçtiklerimi Öde</button>
      <button id="hepsini-ode-btn">Hepsini Öde</button>
      <div class="guven-notu">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#5a7178" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span>iyzico ile güvenli ödeme</span>
      </div>
    </div>

    <div id="tamamlandi">
      <div class="tik">✓</div>
      <div class="baslik">Hesap tamamen ödendi</div>
      <div class="alt">Bizi tercih ettiğiniz için teşekkürler!</div>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL = 'https://ybgzysyojshulpmdyrrm.supabase.co'
    const SUPABASE_KEY = 'sb_publishable__y__ogbkSM4Y0QwFrE-UUQ_Eamnac2R'

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    // Sayfa durumu: veriyi BİR KEZ çekip burada tutuyoruz.
    // Böylece +/− tuşları internete gitmeden, anında çalışır (takılma biter).
    let islemDevamEdiyor = false
    let mevcutMasa = null
    let mevcutAdisyon = null
    let mevcutKalemler = []
    const sepet = {}   // kalem id -> kaç adet seçildi (0 = sepette değil)

    function toastGoster(mesaj, tip) {
      const toast = document.getElementById('toast')
      toast.className = 'gozuk ' + (tip || 'basari')
      toast.innerHTML = mesaj
      setTimeout(() => { toast.className = '' }, 3000)
    }

    const urlParametreleri = new URLSearchParams(window.location.search)
    const qrKod = urlParametreleri.get('qr') || 'x7gh2km9pq'

    // --- Veriyi bir kez çek, sonra ekranı çiz ---
    async function adisyonGetir() {
      const adisyonBilgi = document.getElementById('adisyon-bilgi')

      const { data: masa, error: masaHata } = await supabase
        .from('masalar').select('*').eq('qr_kod', qrKod).single()

      if (masaHata || !masa) {
        adisyonBilgi.innerHTML = '<div class="ozet-etiket">Masa bulunamadı.</div>'
        return
      }
      mevcutMasa = masa

      const { data: adisyon } = await supabase
        .from('adisyonlar').select('*')
        .eq('masa_id', masa.id).eq('durum', 'acik').maybeSingle()

      mevcutAdisyon = adisyon || null

      if (!adisyon) {
        mevcutKalemler = []
        ekraniCiz()
        return
      }

      const { data: kalemler } = await supabase
        .from('adisyon_kalemleri').select('*')
        .eq('adisyon_id', adisyon.id).order('id', { ascending: true })

      mevcutKalemler = kalemler || []
      // Sepet başlangıçta boş: müşteri ne yediyse kendisi seçecek
      mevcutKalemler.forEach(k => { if (sepet[k.id] === undefined) sepet[k.id] = 0 })

      ekraniCiz()
    }

    // --- Ekranı SADECE hafızadaki veriden çiz (internet yok = anında) ---
    function ekraniCiz() {
      const adisyonBilgi = document.getElementById('adisyon-bilgi')
      const kalemlerDiv = document.getElementById('kalemler')
      const tamamlandiDiv = document.getElementById('tamamlandi')
      const hepsiniOdeBtn = document.getElementById('hepsini-ode-btn')
      const sectiklerimiBtn = document.getElementById('sectiklerimi-ode-btn')
      const sepetOzet = document.getElementById('sepet-ozet')

      // Açık hesap yoksa
      if (!mevcutAdisyon) {
        const numara = mevcutMasa ? mevcutMasa.numara : ''
        adisyonBilgi.innerHTML = `<div class="ozet-masa">${numara}</div><div class="ozet-etiket">Bu masada şu an açık bir hesap yok.</div>`
        kalemlerDiv.innerHTML = ''
        hepsiniOdeBtn.style.display = 'none'
        sectiklerimiBtn.style.display = 'none'
        sepetOzet.style.display = 'none'
        tamamlandiDiv.style.display = 'none'
        return
      }

      const kalemler = mevcutKalemler
      const toplam = kalemler.reduce((acc, k) => acc + Number(k.birim_fiyat) * k.adet, 0)
      const odenen = kalemler.reduce((acc, k) => acc + Number(k.birim_fiyat) * k.odenmis_adet, 0)
      const kalan = toplam - odenen
      const yuzde = toplam > 0 ? Math.round((odenen / toplam) * 100) : 0

      // Seçilenlerin toplamı
      let seciliTutar = 0, seciliAdet = 0
      kalemler.forEach(k => {
        const s = sepet[k.id] || 0
        if (s > 0) { seciliTutar += Number(k.birim_fiyat) * s; seciliAdet += s }
      })

      // Üst bant
      adisyonBilgi.innerHTML = `
        <div class="ozet-masa">${mevcutMasa.numara}</div>
        <div class="ozet-etiket">Kalan tutar</div>
        <div class="ozet-tutar">${kalan.toFixed(2)}₺</div>
        <div class="ilerleme-ray"><div class="ilerleme-dolu" style="width:${yuzde}%"></div></div>
        <div class="ozet-satirlar">
          <span>Ödenen: <b>${odenen.toFixed(2)}₺</b></span>
          <span>Toplam: <b>${toplam.toFixed(2)}₺</b></span>
        </div>
      `

      // Kalemler
      kalemlerDiv.innerHTML = kalemler.length > 0 ? '<div class="bolum-baslik">Sipariş kalemleri</div>' : ''
      kalemler.forEach((kalem) => {
        const kalanAdet = kalem.adet - kalem.odenmis_adet
        const tamamenOdendi = kalanAdet === 0
        const birimFiyat = Number(kalem.birim_fiyat)
        const secili = sepet[kalem.id] || 0

        const satir = document.createElement('div')
        satir.className = 'kalem' + (tamamenOdendi ? ' tamamen-odendi' : (secili > 0 ? ' secili' : ''))

        const odenmisYazi = kalem.odenmis_adet > 0 ? ` · ${kalem.odenmis_adet}/${kalem.adet} ödendi` : ''

        if (tamamenOdendi) {
          satir.innerHTML = `
            <div class="kalem-ust">
              <div>
                <div class="kalem-ad">${kalem.urun_adi} × ${kalem.adet}</div>
                <div class="kalem-rozet">✓ Tamamen ödendi</div>
              </div>
              <div class="kalem-fiyat">${(birimFiyat * kalem.adet).toFixed(2)}₺</div>
            </div>
          `
        } else {
          const araToplam = (birimFiyat * secili).toFixed(2)
          const etiket = secili > 0
            ? `<span class="sepet-etiket">${secili} × ${birimFiyat.toFixed(2)}₺ = ${araToplam}₺</span>`
            : `<span class="sepet-etiket bos">Ödeyeceğin adedi seç</span>`
          satir.innerHTML = `
            <div class="kalem-ust">
              <div>
                <div class="kalem-ad">${kalem.urun_adi} × ${kalem.adet}</div>
                <div class="kalem-detay">${birimFiyat.toFixed(2)}₺ / adet${odenmisYazi}</div>
              </div>
              <div class="kalem-fiyat">${(birimFiyat * kalem.adet).toFixed(2)}₺</div>
            </div>
            <div class="kalem-alt">
              <button class="adet-btn" data-aksiyon="azalt" data-kalem-id="${kalem.id}" ${secili <= 0 ? 'disabled' : ''}>−</button>
              <span class="adet-sayi">${secili}</span>
              <button class="adet-btn" data-aksiyon="arttir" data-kalem-id="${kalem.id}" ${secili >= kalanAdet ? 'disabled' : ''}>+</button>
              ${etiket}
            </div>
          `
        }
        kalemlerDiv.appendChild(satir)
      })

      const hesapBitti = kalan === 0 && kalemler.length > 0
      tamamlandiDiv.style.display = hesapBitti ? 'block' : 'none'

      // Seçilenler özeti + "Seçtiklerimi Öde" butonu
      if (!hesapBitti && seciliTutar > 0) {
        sepetOzet.style.display = 'block'
        sepetOzet.innerHTML = `${seciliAdet} adet seçildi · <b>${seciliTutar.toFixed(2)}₺</b>`
        sectiklerimiBtn.style.display = 'block'
        sectiklerimiBtn.innerHTML = 'Seçtiklerimi Öde · ' + seciliTutar.toFixed(2) + '₺'
        sectiklerimiBtn.onclick = () => sectiklerimiOde()
      } else {
        sepetOzet.style.display = 'none'
        sectiklerimiBtn.style.display = 'none'
      }

      // "Hepsini Öde" butonu
      if (!hesapBitti && kalan > 0) {
        hepsiniOdeBtn.style.display = 'block'
        hepsiniOdeBtn.innerHTML = 'Hepsini Öde · ' + kalan.toFixed(2) + '₺'
        hepsiniOdeBtn.onclick = () => hepsiniOde(kalan)
      } else {
        hepsiniOdeBtn.style.display = 'none'
      }

      // +/− tuşları: sadece hafızadaki sepeti değiştir, anında yeniden çiz
      kalemlerDiv.querySelectorAll('[data-aksiyon]').forEach(btn => {
        btn.onclick = () => {
          const aksiyon = btn.getAttribute('data-aksiyon')
          const kalemId = Number(btn.getAttribute('data-kalem-id'))
          const kalem = kalemler.find(k => k.id === kalemId)
          const kalanAdet = kalem.adet - kalem.odenmis_adet
          const simdiki = sepet[kalemId] || 0

          if (aksiyon === 'arttir' && simdiki < kalanAdet) sepet[kalemId] = simdiki + 1
          else if (aksiyon === 'azalt' && simdiki > 0) sepet[kalemId] = simdiki - 1

          ekraniCiz()
        }
      })
    }

    // --- Ödeme: seçilen birden fazla kalemi tek fişte gönder ---
    function sectiklerimiOde() {
      if (islemDevamEdiyor) return

      let fis = 'MULTI-' + mevcutAdisyon.id
      let tutar = 0
      mevcutKalemler.forEach(k => {
        const s = sepet[k.id] || 0
        if (s > 0) {
          fis += '-' + k.id + '-' + s
          tutar += Number(k.birim_fiyat) * s
        }
      })

      if (tutar <= 0) {
        toastGoster('Önce ödeyeceğin kalemleri seç', 'hata')
        return
      }

      islemDevamEdiyor = true
      odemeyeYonlen(fis, tutar)
    }

    async function hepsiniOde(kalan) {
      if (islemDevamEdiyor) return
      if (!confirm('Tüm ödenmemiş kalemleri ödemek istiyor musun? Toplam: ' + kalan.toFixed(2) + '₺')) {
        return
      }
      islemDevamEdiyor = true
      await odemeyeYonlen('FULL-' + mevcutAdisyon.id, kalan)
    }

    async function odemeyeYonlen(fis, tutar) {
      try {
        const cevap = await fetch('/api/odeme-baslat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fis: fis, tutar: tutar })
        })
        const veri = await cevap.json()
        if (!veri.basarili || !veri.sonuc || !veri.sonuc.paymentPageUrl) {
          toastGoster('Ödeme başlatılamadı, tekrar deneyin', 'hata')
          islemDevamEdiyor = false
          return
        }
        window.location.href = veri.sonuc.paymentPageUrl
      } catch (e) {
        toastGoster('Bağlantı hatası: ' + e.message, 'hata')
        islemDevamEdiyor = false
      }
    }

    adisyonGetir()
  </script>

</body>
</html>
